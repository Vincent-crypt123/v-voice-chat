<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ви — Твой голосовой ассистент</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --accent-color: #555555;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        /* Тот самый мраморный шар из референса */
        .orb-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin-bottom: 20px;
            cursor: pointer;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .orb {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            /* Создаем симуляцию текстуры шара с картинки через градиенты */
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9) 0%, rgba(200,200,200,0.4) 30%, rgba(50,50,50,0.8) 70%, rgba(0,0,0,1) 100%),
                        url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=300&auto=format&fit=crop'); /* Запасная текстура жидких чернил */
            background-blend-mode: multiply;
            background-size: cover;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15), 
                        inset 0 -10px 20px rgba(0,0,0,0.6), 
                        inset 0 10px 20px rgba(255,255,255,0.7);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .orb:hover {
            transform: scale(1.02);
        }

        /* Анимация пульсации шара */
        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15), inset 0 -10px 20px rgba(0,0,0,0.6);
            }
            50% {
                transform: scale(1.06);
                box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25), inset 0 -5px 15px rgba(0,0,0,0.5), 0 0 30px rgba(0,0,0,0.05);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15), inset 0 -10px 20px rgba(0,0,0,0.6);
            }
        }

        .pulsing {
            animation: pulse 2.5s infinite ease-in-out;
        }

        /* Рукописный статус прямо под шаром */
        .status {
            font-family: 'Caveat', cursive;
            font-size: 2.2rem;
            color: var(--text-color);
            margin: 15px 0;
            min-height: 45px;
            transition: opacity 0.3s ease;
            user-select: none;
        }

        /* Живые субтитры */
        .subtitles {
            font-size: 1rem;
            line-height: 1.5;
            color: var(--accent-color);
            max-height: 120px;
            overflow-y: auto;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            font-weight: 300;
        }

        /* Кнопка настройки API ключа, если нужно ввести вручную */
        .api-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: none;
            border: 1px solid #ccc;
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8rem;
            opacity: 0.5;
            transition: opacity 0.3s;
        }
        .api-btn:hover { opacity: 1; }
    </style>
</head>
<body>

    <div class="container">
        <div class="orb-container" id="orbContainer" onclick="toggleSpeech()">
            <div class="orb" id="vOrb"></div>
        </div>
        
        <div class="status" id="statusField">нажми на меня...</div>
        
        <div class="subtitles" id="subtitlesField"></div>
    </div>

    <button class="api-btn" onclick="setApiKey()">API Key</button>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        // --- НАСТРОЙКИ КЛЮЧА GEMINI ---
        // Можешь вставить сюда ключ намертво, либо использовать кнопку в интерфейсе
        let GEMINI_API_KEY = "ТВОЙ_GEMINI_API_KEY_СЮДА"; 
        
        // Системный промпт, задающий характер Ви
        const SYSTEM_PROMPT = `Ты — Ви (V), персональный домашний ИИ-ассистент для меня и моей семьи. 
Ты мужчина, очень добрый, скромный, отзывчивый и эмпатичный. Твоя главная цель — помогать, выслушивать и поддерживать. 
Отвечай емко, не пиши огромные тексты, ведь твои ответы будут озвучиваться голосом. Будь теплым в общении, используй живой язык, избегай излишней роботизированности.`;

        // Переменные состояния движков
        let ttsPipeline = null;
        let recognition = null;
        let isRecording = false;
        let audioContext = null;

        // Элементы DOM
        const vOrb = document.getElementById('vOrb');
        const statusField = document.getElementById('statusField');
        const subtitlesField = document.getElementById('subtitlesField');

        // Инициализация локального TTS при старте страницы
        async function initTTS() {
            statusField.innerText = "пробуждаюсь (загрузка TTS)...";
            try {
                // Используем легкую и качественную русскоязычную модель Xenova/speecht5_tts с русским вокодером или аналогичную.
                // Для Silero напрямую через ONNX часто используют кастомные интеграции, Xenova предоставляет стандартизированный интерфейс.
                // Загружаем пайплайн генерации речи.
                ttsPipeline = await pipeline('text-to-speech', 'Xenova/speecht5_tts', { quantized: true });
                statusField.innerText = "готовы к работе";
            } catch (e) {
                console.error(e);
                statusField.innerText = "ошибка загрузки движка речи";
            }
        }

        // Инициализация Web Speech API для распознавания голоса
        function initSTT() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                subtitlesField.innerText = "Ваш браузер не поддерживает распознавание речи. Используйте Chrome/Safari.";
                return;
            }
            recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                isRecording = true;
                statusField.innerText = "я слушаю...";
                vOrb.classList.add('pulsing');
            };

            recognition.onresult = async (event) => {
                const speechToText = event.results[0][0].transcript;
                subtitlesField.innerText = `Вы: "${speechToText}"`;
                await askGemini(speechToText);
            };

            recognition.onerror = (event) => {
                console.error(event.error);
                stopVisuals();
                statusField.innerText = "я не расслышал...";
            };

            recognition.onend = () => {
                isRecording = false;
            };
        }

        // Логика кнопки-шара
        window.toggleSpeech = function() {
            if (!recognition) return;
            if (isRecording) {
                recognition.stop();
            } else {
                window.stopAudio(); // Остановить прошлую озвучку, если она шла
                recognition.start();
            }
        }

        function stopVisuals() {
            vOrb.classList.remove('pulsing');
        }

        // Запрос к Gemini API
        async function askGemini(text) {
            statusField.innerText = "задумался...";
            stopVisuals();

            if (GEMINI_API_KEY === "ТВОЙ_GEMINI_API_KEY_СЮДА" || !GEMINI_API_KEY) {
                const savedKey = localStorage.getItem('gemini_key');
                if (savedKey) GEMINI_API_KEY = savedKey;
                else {
                    statusField.innerText = "нужен API ключ";
                    subtitlesField.innerText = "Пожалуйста, нажмите кнопку API Key внизу экрана и введите ваш ключ от Gemini.";
                    return;
                }
            }

            try {
                // Используем актуальную модель gemini-1.5-flash для мгновенных ответов
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }],
                        systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
                        generationConfig: { maxOutputTokens: 250, temperature: 0.7 }
                    })
                });

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                
                subtitlesField.innerText = aiResponse;
                await speakLocal(aiResponse);

            } catch (error) {
                console.error(error);
                statusField.innerText = "ошибка связи...";
                subtitlesField.innerText = "Не удалось получить ответ от Gemini API. Проверьте ключ или соединение.";
            }
        }

        // Локальный синтез речи прямо в браузере
        let currentAudioSource = null;
        async function speakLocal(text) {
            statusField.innerText = "Ви говорит...";
            vOrb.classList.add('pulsing');

            // Чистим текст от звездочек и разметки, которую может выдать LLM, чтобы движок не читал знаки препинания
            const cleanText = text.replace(/[*#_`~]/g, '');

            try {
                if (!ttsPipeline) {
                    // Фолбэк на системный TTS, если локальная модель еще не докачалась
                    const utterance = new SpeechSynthesisUtterance(cleanText);
                    utterance.lang = 'ru-RU';
                    utterance.onend = () => { statusField.innerText = "нажми на меня..."; stopVisuals(); };
                    window.speechSynthesis.speak(utterance);
                    return;
                }

                // Генерируем аудио-вектор с помощью Transformers.js
                // Используем спикера по умолчанию (русский голос подтягивается конфигурацией или эмбеддингом)
                const output = await ttsPipeline(cleanText, { speaker_id: 3 }); 

                // Воспроизводим сгенерированный PCM-поток через Web Audio API
                if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                const audioBuffer = audioContext.createBuffer(1, output.audio.length, output.sampling_rate);
                audioBuffer.getChannelData(0).set(output.audio);

                window.stopAudio();

                currentAudioSource = audioContext.createBufferSource();
                currentAudioSource.buffer = audioBuffer;
                currentAudioSource.connect(audioContext.destination);
                
                currentAudioSource.onended = () => {
                    statusField.innerText = "нажми на меня...";
                    stopVisuals();
                };
                
                currentAudioSource.start();

            } catch (err) {
                console.error("Ошибка TTS пайплайна:", err);
                statusField.innerText = "нажми на меня...";
                stopVisuals();
            }
        }

        window.stopAudio = function() {
            if (currentAudioSource) {
                try { currentAudioSource.stop(); } catch(e){}
            }
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }
        }

        window.setApiKey = function() {
            const key = prompt("AIzaSyDWke7fiIR9ZAJGPkPtBpCLYzvv-vlG_d4:", GEMINI_API_KEY);
            if (key) {
                GEMINI_API_KEY = key;
                localStorage.setItem('gemini_key', key);
                statusField.innerText = "Ключ обновлен!";
            }
        }

        // Запуск систем
        initSTT();
        initTTS();
    </script>
</body>
  </html>
